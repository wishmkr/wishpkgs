name: Build WishOS Packages

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUSYBOX_VERSION: "1.36.1"
  FASTFETCH_VERSION: "2.66.0"
  CURL_VERSION: "8.21.0"
  HTOP_VERSION: "3.5.2"
  PACKAGE_RELEASE: "1"

jobs:
  build:
    name: Build ${{ matrix.package }} for ${{ matrix.arch }}

    strategy:
      fail-fast: false
      matrix:
        package:
          - busybox
          - fastfetch
          - curl
          - htop

        include:
          - arch: x86_64
            runner: ubuntu-latest

          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            cmake \
            ninja-build \
            wget \
            curl \
            git \
            file \
            bzip2 \
            gzip \
            tar \
            xz-utils \
            libssl-dev \
            zlib1g-dev \
            libncursesw5-dev \
            libncurses-dev

      - name: Create working directories
        run: |
          rm -rf source build package-root

          mkdir -p \
            source \
            build \
            package-root \
            "pkgs/${{ matrix.arch }}"

      # ------------------------------------------------------------
      # BusyBox
      # ------------------------------------------------------------

      - name: Download BusyBox
        if: matrix.package == 'busybox'
        working-directory: source
        run: |
          wget --https-only \
            "https://busybox.net/downloads/busybox-${BUSYBOX_VERSION}.tar.bz2"

          tar -xf "busybox-${BUSYBOX_VERSION}.tar.bz2"

            - name: Configure BusyBox
        if: matrix.package == 'busybox'
        working-directory: source
        run: |
          cd "busybox-${BUSYBOX_VERSION}"

          make defconfig

          if grep -q '^# CONFIG_STATIC is not set$' .config; then
            sed -i \
              's/^# CONFIG_STATIC is not set$/CONFIG_STATIC=y/' \
              .config
          elif grep -q '^CONFIG_STATIC=' .config; then
            sed -i \
              's/^CONFIG_STATIC=.*/CONFIG_STATIC=y/' \
              .config
          else
            echo 'CONFIG_STATIC=y' >> .config
          fi

          # Disable TC tool due to kernel header compatibility issues
          sed -i 's/^CONFIG_TC=.*/# CONFIG_TC is not set/' .config
          echo '# CONFIG_TC is not set' >> .config

          yes "" | make oldconfig

          grep '^CONFIG_STATIC=y' .config
          
      - name: Build and install BusyBox
        if: matrix.package == 'busybox'
        working-directory: source
        run: |
          cd "busybox-${BUSYBOX_VERSION}"

          make -j"$(nproc)"

          make \
            CONFIG_PREFIX="$GITHUB_WORKSPACE/package-root" \
            install

          file busybox

      # ------------------------------------------------------------
      # Fastfetch
      # ------------------------------------------------------------

      - name: Download Fastfetch
        if: matrix.package == 'fastfetch'
        working-directory: source
        run: |
          wget --https-only \
            "https://github.com/fastfetch-cli/fastfetch/archive/refs/tags/${FASTFETCH_VERSION}.tar.gz" \
            -O "fastfetch-${FASTFETCH_VERSION}.tar.gz"

          tar -xf "fastfetch-${FASTFETCH_VERSION}.tar.gz"

      - name: Build and install Fastfetch
        if: matrix.package == 'fastfetch'
        run: |
          cmake \
            -S "source/fastfetch-${FASTFETCH_VERSION}" \
            -B build/fastfetch \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTS=OFF

          cmake \
            --build build/fastfetch \
            --parallel "$(nproc)"

          DESTDIR="$GITHUB_WORKSPACE/package-root" \
            cmake --install build/fastfetch

          file package-root/usr/bin/fastfetch

      # ------------------------------------------------------------
      # curl
      # ------------------------------------------------------------

      - name: Download curl
        if: matrix.package == 'curl'
        working-directory: source
        run: |
          wget --https-only \
            "https://curl.se/download/curl-${CURL_VERSION}.tar.xz"

          tar -xf "curl-${CURL_VERSION}.tar.xz"

      - name: Build and install curl
        if: matrix.package == 'curl'
        working-directory: source
        run: |
          cd "curl-${CURL_VERSION}"

          ./configure \
            --prefix=/usr \
            --with-openssl \
            --with-zlib \
            --without-libpsl \
            --without-brotli \
            --without-zstd \
            --disable-ldap \
            --disable-ldaps \
            --disable-manual \
            --disable-docs

          make -j"$(nproc)"

          make \
            DESTDIR="$GITHUB_WORKSPACE/package-root" \
            install

          file "$GITHUB_WORKSPACE/package-root/usr/bin/curl"

      # ------------------------------------------------------------
      # htop
      # ------------------------------------------------------------

      - name: Download htop
        if: matrix.package == 'htop'
        working-directory: source
        run: |
          wget --https-only \
            "https://github.com/htop-dev/htop/archive/refs/tags/${HTOP_VERSION}.tar.gz" \
            -O "htop-${HTOP_VERSION}.tar.gz"

          tar -xf "htop-${HTOP_VERSION}.tar.gz"

      - name: Build and install htop
        if: matrix.package == 'htop'
        working-directory: source
        run: |
          cd "htop-${HTOP_VERSION}"

          ./autogen.sh

          ./configure \
            --prefix=/usr \
            --enable-unicode

          make -j"$(nproc)"

          make \
            DESTDIR="$GITHUB_WORKSPACE/package-root" \
            install

          file "$GITHUB_WORKSPACE/package-root/usr/bin/htop"

      # ------------------------------------------------------------
      # WishOS package metadata
      # ------------------------------------------------------------

      - name: Determine package metadata
        id: metadata
        shell: bash
        run: |
          case "${{ matrix.package }}" in
            busybox)
              VERSION="$BUSYBOX_VERSION"
              DESCRIPTION="BusyBox base utilities for WishOS"
              LICENSE="GPL-2.0-only"
              DEPENDS=""
              ;;

            fastfetch)
              VERSION="$FASTFETCH_VERSION"
              DESCRIPTION="Fast system information utility"
              LICENSE="MIT"
              DEPENDS="glibc"
              ;;

            curl)
              VERSION="$CURL_VERSION"
              DESCRIPTION="Command line URL transfer utility"
              LICENSE="curl"
              DEPENDS="glibc,openssl,zlib"
              ;;

            htop)
              VERSION="$HTOP_VERSION"
              DESCRIPTION="Interactive process viewer"
              LICENSE="GPL-2.0-or-later"
              DEPENDS="glibc,ncurses"
              ;;

            *)
              echo "Unknown package: ${{ matrix.package }}"
              exit 1
              ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "license=$LICENSE" >> "$GITHUB_OUTPUT"
          echo "depends=$DEPENDS" >> "$GITHUB_OUTPUT"

      - name: Add WishOS metadata
        run: |
          mkdir -p package-root/WISH

          cat > package-root/WISH/info <<EOF
          name=${{ matrix.package }}
          version=${{ steps.metadata.outputs.version }}
          release=${PACKAGE_RELEASE}
          arch=${{ matrix.arch }}
          description=${{ steps.metadata.outputs.description }}
          license=${{ steps.metadata.outputs.license }}
          depends=${{ steps.metadata.outputs.depends }}
          EOF

          find package-root \
            -mindepth 1 \
            ! -path 'package-root/WISH/files' \
            -printf '%P\n' \
            | sort \
            > package-root/WISH/files

      - name: Create .wsh package
        run: |
          PACKAGE_NAME="${{ matrix.package }}-${{ steps.metadata.outputs.version }}-${PACKAGE_RELEASE}-${{ matrix.arch }}.wsh"
          PACKAGE_DIRECTORY="pkgs/${{ matrix.arch }}"

          tar \
            --numeric-owner \
            --owner=0 \
            --group=0 \
            -C package-root \
            -czf "$PACKAGE_DIRECTORY/$PACKAGE_NAME" \
            .

          sha256sum \
            "$PACKAGE_DIRECTORY/$PACKAGE_NAME" \
            > "$PACKAGE_DIRECTORY/$PACKAGE_NAME.sha256"

          echo "Created package:"
          ls -lh "$PACKAGE_DIRECTORY/$PACKAGE_NAME"

          echo
          echo "Package contents:"
          tar -tzf "$PACKAGE_DIRECTORY/$PACKAGE_NAME" | head -50

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishpkgs-${{ matrix.package }}-${{ matrix.arch }}
          path: |
            pkgs/${{ matrix.arch }}/*.wsh
            pkgs/${{ matrix.arch }}/*.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish packages to main
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wishpkgs-*
          path: downloaded-packages
          merge-multiple: false

      - name: Copy packages into repository
        run: |
          mkdir -p \
            pkgs/x86_64 \
            pkgs/aarch64

          find downloaded-packages \
            -type f \
            -name '*.wsh' \
            -exec sh -c '
              for file do
                case "$file" in
                  *-x86_64.wsh)
                    cp "$file" pkgs/x86_64/
                    ;;
                  *-aarch64.wsh)
                    cp "$file" pkgs/aarch64/
                    ;;
                esac
              done
            ' sh {} +

          find downloaded-packages \
            -type f \
            -name '*.sha256' \
            -exec sh -c '
              for file do
                case "$file" in
                  *-x86_64.wsh.sha256)
                    cp "$file" pkgs/x86_64/
                    ;;
                  *-aarch64.wsh.sha256)
                    cp "$file" pkgs/aarch64/
                    ;;
                esac
              done
            ' sh {} +

          echo "Packages ready for publishing:"
          find pkgs -maxdepth 2 -type f -print | sort

      - name: Commit packages to main
        run: |
          git config \
            user.name \
            "WishOS Build Bot"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add pkgs/

          if git diff --cached --quiet; then
            echo "No package changes to commit."
            exit 0
          fi

          git commit \
            -m "build: update WishOS packages"

          git pull \
            --rebase \
            origin main

          git push \
            origin HEAD:main
