name: Build WishOS Graphics Base (AArch64)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wishos-graphics-aarch64
  cancel-in-progress: false

env:
  ARCH: "aarch64"
  PACKAGE_RELEASE: "1"

  MESA_VERSION: "24.0.8"
  XORG_SERVER_VERSION: "21.1.23"
  XORG_LIBINPUT_VERSION: "1.5.0"

jobs:
  build:
    name: Build ${{ matrix.package }} for AArch64

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: mesa
            version: "24.0.8"

          - package: xorg-server
            version: "21.1.23"

          - package: xorg-input-libinput
            version: "1.5.0"

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install common build tools
        run: |
          set -eux

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            meson \
            ninja-build \
            cmake \
            python3 \
            python3-mako \
            python3-packaging \
            python3-ply \
            python3-setuptools \
            python3-yaml \
            flex \
            bison \
            xutils-dev \
            wget \
            curl \
            git \
            file \
            tar \
            gzip \
            bzip2 \
            xz-utils

      - name: Install graphics development packages
        run: |
          set -eux

          sudo apt-get install -y \
            libdrm-dev \
            libgbm-dev \
            libegl-dev \
            libgl-dev \
            libglvnd-dev \
            libglx-dev \
            libwayland-dev \
            libwayland-egl-backend-dev \
            wayland-protocols \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-dri2-0-dev \
            libxcb-dri3-dev \
            libxcb-glx0-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxfont-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbfile-dev \
            libxrandr-dev \
            libxrender-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libpixman-1-dev \
            libepoxy-dev \
            libfontenc-dev \
            libfreetype-dev \
            libudev-dev \
            libsystemd-dev \
            libselinux1-dev \
            libunwind-dev \
            libaudit-dev \
            libinput-dev \
            libevdev-dev \
            libmtdev-dev \
            libpciaccess-dev \
            libxcvt-dev \
            libelf-dev \
            libexpat1-dev \
            libzstd-dev \
            zlib1g-dev \
            llvm-dev \
            libclang-dev \
            xserver-xorg-dev \
            x11proto-dev

      - name: Create working directories
        run: |
          set -eux

          rm -rf source build package-root

          mkdir -p \
            source \
            build \
            package-root \
            "pkgs/${ARCH}"

      # ============================================================
      # Mesa
      # ============================================================

      - name: Download Mesa
        if: matrix.package == 'mesa'
        working-directory: source
        run: |
          set -eux

          wget --https-only \
            "https://archive.mesa3d.org/mesa-${MESA_VERSION}.tar.xz"

          tar -xf "mesa-${MESA_VERSION}.tar.xz"

      - name: Verify Mesa dependencies
        if: matrix.package == 'mesa'
        run: |
          set -eux

          pkg-config --modversion libdrm
          pkg-config --modversion libudev
          pkg-config --modversion wayland-client
          pkg-config --modversion wayland-server
          pkg-config --modversion wayland-egl-backend
          pkg-config --modversion x11
          pkg-config --modversion xcb
          pkg-config --modversion expat
          llvm-config --version

      - name: Configure Mesa
        if: matrix.package == 'mesa'
        run: |
          set -eux

          meson setup \
            build/mesa \
            "source/mesa-${MESA_VERSION}" \
            --prefix=/usr \
            --libdir=lib \
            --buildtype=release \
            --wrap-mode=nodownload \
            -Dbuild-tests=false \
            -Dplatforms=x11,wayland \
            -Dgallium-drivers=swrast,virgl \
            -Dvulkan-drivers=swrast \
            -Dglx=dri \
            -Degl=enabled \
            -Dgbm=enabled \
            -Dllvm=enabled \
            -Dshared-glapi=enabled

      - name: Build and install Mesa
        if: matrix.package == 'mesa'
        run: |
          set -eux

          meson compile \
            -C build/mesa \
            -j "$(nproc)"

          DESTDIR="$GITHUB_WORKSPACE/package-root" \
            meson install -C build/mesa

          test -d package-root/usr/lib

          find package-root/usr/lib \
            -maxdepth 4 \
            \( -type f -o -type l \) \
            | head -50

      # ============================================================
      # X.Org Server
      # ============================================================

      - name: Download X.Org Server
        if: matrix.package == 'xorg-server'
        working-directory: source
        run: |
          set -eux

          wget --https-only \
            "https://www.x.org/releases/individual/xserver/xorg-server-${XORG_SERVER_VERSION}.tar.xz"

          tar -xf \
            "xorg-server-${XORG_SERVER_VERSION}.tar.xz"

      - name: Verify X.Org Server dependencies
        if: matrix.package == 'xorg-server'
        run: |
          set -eux

          pkg-config --modversion pixman-1
          pkg-config --modversion libdrm
          pkg-config --modversion libudev
          pkg-config --modversion libepoxy
          pkg-config --modversion xkbfile
          pkg-config --modversion xfont2
          pkg-config --modversion pciaccess
          pkg-config --modversion libxcvt

      - name: Configure X.Org Server
        if: matrix.package == 'xorg-server'
        run: |
          set -eux

          meson setup \
            build/xorg-server \
            "source/xorg-server-${XORG_SERVER_VERSION}" \
            --prefix=/usr \
            --libdir=lib \
            --sysconfdir=/etc \
            --localstatedir=/var \
            --buildtype=release \
            --wrap-mode=nodownload \
            -Dxorg=true \
            -Dxnest=false \
            -Dxvfb=false \
            -Dxephyr=false \
            -Dglamor=true \
            -Dudev=true \
            -Dsystemd_logind=false

      - name: Show X.Org configuration
        if: matrix.package == 'xorg-server'
        run: |
          meson configure build/xorg-server

      - name: Build and install X.Org Server
        if: matrix.package == 'xorg-server'
        run: |
          set -eux

          meson compile \
            -C build/xorg-server \
            -j "$(nproc)"

          DESTDIR="$GITHUB_WORKSPACE/package-root" \
            meson install -C build/xorg-server

          test -x package-root/usr/bin/Xorg
          file package-root/usr/bin/Xorg

      # ============================================================
      # xf86-input-libinput
      # ============================================================

      - name: Download xf86-input-libinput
        if: matrix.package == 'xorg-input-libinput'
        working-directory: source
        run: |
          set -eux

          wget --https-only \
            "https://www.x.org/releases/individual/driver/xf86-input-libinput-${XORG_LIBINPUT_VERSION}.tar.xz"

          tar -xf \
            "xf86-input-libinput-${XORG_LIBINPUT_VERSION}.tar.xz"

      - name: Verify input-driver dependencies
        if: matrix.package == 'xorg-input-libinput'
        run: |
          set -eux

          pkg-config --modversion xorg-server
          pkg-config --modversion xproto
          pkg-config --modversion inputproto
          pkg-config --modversion libinput

          pkg-config \
            --cflags \
            xorg-server xproto inputproto libinput

      - name: Configure xf86-input-libinput
        if: matrix.package == 'xorg-input-libinput'
        working-directory: source
        run: |
          set -eux

          cd "xf86-input-libinput-${XORG_LIBINPUT_VERSION}"

          ./configure \
            --prefix=/usr \
            --libdir=/usr/lib \
            --sysconfdir=/etc \
            --disable-static

      - name: Build and install xf86-input-libinput
        if: matrix.package == 'xorg-input-libinput'
        working-directory: source
        run: |
          set -eux

          cd "xf86-input-libinput-${XORG_LIBINPUT_VERSION}"

          make -j"$(nproc)"

          make \
            DESTDIR="$GITHUB_WORKSPACE/package-root" \
            install

          DRIVER="$GITHUB_WORKSPACE/package-root/usr/lib/xorg/modules/input/libinput_drv.so"

          test -f "$DRIVER"
          file "$DRIVER"

      # ============================================================
      # WishOS metadata
      # ============================================================

      - name: Determine package metadata
        id: metadata
        shell: bash
        run: |
          set -eu

          case "${{ matrix.package }}" in
            mesa)
              DESCRIPTION="Mesa OpenGL, EGL, GBM and Vulkan graphics stack"
              LICENSE="MIT"
              DEPENDS="glibc,libdrm,libelf,libexpat,libx11,libxcb,libudev,wayland,zlib,zstd"
              ;;

            xorg-server)
              DESCRIPTION="X.Org display server for WishOS"
              LICENSE="MIT"
              DEPENDS="glibc,libdrm,libepoxy,libpciaccess,libpixman,libudev,libx11,libxcb,libxfont,libxkbfile"
              ;;

            xorg-input-libinput)
              DESCRIPTION="X.Org input driver using libinput"
              LICENSE="MIT"
              DEPENDS="glibc,libinput,xorg-server"
              ;;

            *)
              echo "Unknown package: ${{ matrix.package }}" >&2
              exit 1
              ;;
          esac

          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "license=$LICENSE" >> "$GITHUB_OUTPUT"
          echo "depends=$DEPENDS" >> "$GITHUB_OUTPUT"

      - name: Verify package filesystem
        run: |
          set -eux

          FILE_COUNT="$(
            find package-root \
              \( -type f -o -type l \) \
              | wc -l
          )"

          echo "Installed files and links: $FILE_COUNT"

          if [ "$FILE_COUNT" -lt 1 ]; then
            echo "Package root is empty." >&2
            exit 1
          fi

          case "${{ matrix.package }}" in
            mesa)
              find package-root/usr/lib \
                \( -name 'libEGL.so*' \
                -o -name 'libGLX.so*' \
                -o -name 'libgbm.so*' \
                -o -name 'libgallium*.so*' \) \
                -print |
                grep .
              ;;

            xorg-server)
              test -x package-root/usr/bin/Xorg
              ;;

            xorg-input-libinput)
              test -f \
                package-root/usr/lib/xorg/modules/input/libinput_drv.so
              ;;
          esac

      - name: Add WishOS package metadata
        run: |
          set -eux

          mkdir -p package-root/WISH

          cat > package-root/WISH/info <<EOF
          name=${{ matrix.package }}
          version=${{ matrix.version }}
          release=${PACKAGE_RELEASE}
          arch=${ARCH}
          description=${{ steps.metadata.outputs.description }}
          license=${{ steps.metadata.outputs.license }}
          depends=${{ steps.metadata.outputs.depends }}
          EOF

          find package-root \
            -mindepth 1 \
            ! -path 'package-root/WISH/files' \
            -printf '%P\n' \
            | sort \
            > package-root/WISH/files

          cat package-root/WISH/info

      - name: Create .wsh package
        id: package
        shell: bash
        run: |
          set -eux

          PACKAGE_FILE="${{ matrix.package }}-${{ matrix.version }}-${PACKAGE_RELEASE}-${ARCH}.wsh"
          PACKAGE_PATH="pkgs/${ARCH}/${PACKAGE_FILE}"

          tar \
            --numeric-owner \
            --owner=0 \
            --group=0 \
            -C package-root \
            -czf "$PACKAGE_PATH" \
            .

          HASH="$(
            sha256sum "$PACKAGE_PATH" |
            awk '{print $1}'
          )"

          printf '%s  %s\n' \
            "$HASH" \
            "$PACKAGE_FILE" \
            > "${PACKAGE_PATH}.sha256"

          echo "file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

          echo "Created WishOS package:"
          ls -lh \
            "$PACKAGE_PATH" \
            "${PACKAGE_PATH}.sha256"

          echo
          echo "First package entries:"
          tar -tzf "$PACKAGE_PATH" | head -50

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishpkgs-${{ matrix.package }}-${{ env.ARCH }}
          path: |
            pkgs/${{ env.ARCH }}/${{ steps.package.outputs.file }}
            pkgs/${{ env.ARCH }}/${{ steps.package.outputs.file }}.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish AArch64 graphics packages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all graphics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wishpkgs-*-aarch64
          path: downloaded-packages
          merge-multiple: true

      - name: Copy packages into repository
        run: |
          set -eux

          mkdir -p pkgs/aarch64

          find downloaded-packages \
            -maxdepth 1 \
            -type f \
            \( -name '*.wsh' -o -name '*.wsh.sha256' \) \
            -exec cp -v '{}' pkgs/aarch64/ ';'

          PACKAGE_COUNT="$(
            find pkgs/aarch64 \
              -maxdepth 1 \
              -type f \
              -name '*.wsh' \
              | wc -l
          )"

          echo "Total AArch64 packages in repository: $PACKAGE_COUNT"

          find pkgs/aarch64 \
            -maxdepth 1 \
            -type f \
            | sort

      - name: Commit packages to main
        run: |
          set -eux

          git config \
            user.name \
            "WishOS Build Bot"

          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add pkgs/aarch64/

          if git diff --cached --quiet; then
            echo "No package changes to commit."
            exit 0
          fi

          git commit \
            -m "build: update AArch64 graphics packages"

          git pull \
            --rebase \
            origin main

          git push \
            origin HEAD:main
