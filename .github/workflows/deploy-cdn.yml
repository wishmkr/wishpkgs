name: Deploy cdn.wishpkgs.org (Cloudflare Worker -> B2)

# One-shot setup: deploys a Cloudflare Worker that proxies cdn.wishpkgs.org to
# the public Backblaze B2 bucket, and binds the custom domain. Re-runnable.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      WORKER_NAME: wishpkgs-cdn
      DOMAIN: cdn.wishpkgs.org
      ZONE_NAME: wishpkgs.org
      B2_BASE: https://s3.eu-central-003.backblazeb2.com/wishpkgs
    steps:
      - name: Deploy Worker + bind custom domain
        run: |
          set -euo pipefail
          API=https://api.cloudflare.com/client/v4
          auth=(-H "Authorization: Bearer $CF_API_TOKEN")

          echo "== Resolve zone + account =="
          ZONE_JSON=$(curl -s "${auth[@]}" "$API/zones?name=$ZONE_NAME")
          ZONE_ID=$(echo "$ZONE_JSON" | jq -r '.result[0].id')
          ACCT_ID=$(echo "$ZONE_JSON" | jq -r '.result[0].account.id')
          echo "zone=$ZONE_ID account=$ACCT_ID"
          test "$ZONE_ID" != "null" -a -n "$ZONE_ID"

          echo "== Write Worker script =="
          cat > worker.js <<'JS'
          // Deliberately uncached, with a brute-force guarantee: every upstream
          // fetch carries a unique cache-busting query param, so it can never
          // collide with a previously-cached copy of that URL under any
          // caching layer. A Worker's outbound fetch() cache key is the
          // *upstream* URL, independent of which zone/Worker requested it --
          // a long cacheTtl here previously kept serving a stale index to
          // every wish client and to lib.wishpkgs.org (same upstream URL,
          // different Worker) long after B2 had moved on, and same-zone
          // purge_cache couldn't reach it either (that cache key belongs to
          // B2's hostname, not ours). wish clients and the package browser
          // both need live data, so guaranteed freshness beats a cache hit.
          export default {
            async fetch(request) {
              const B2 = "https://s3.eu-central-003.backblazeb2.com/wishpkgs";
              const url = new URL(request.url);
              const cb = "cb=" + Date.now() + Math.random().toString(36).slice(2);
              const target = B2 + url.pathname + (url.search ? url.search + "&" + cb : "?" + cb);
              const resp = await fetch(target, { cf: { cacheTtl: 0 } });
              return new Response(resp.body, { status: resp.status, headers: resp.headers });
            }
          }
          JS

          echo "== Upload Worker (module) =="
          UP=$(curl -s -X PUT "${auth[@]}" \
            "$API/accounts/$ACCT_ID/workers/scripts/$WORKER_NAME" \
            -F 'metadata={"main_module":"worker.js"};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module')
          echo "$UP" | jq -r '{success, errors}'
          test "$(echo "$UP" | jq -r '.success')" = "true"

          echo "== Bind custom domain $DOMAIN =="
          DOM=$(curl -s -X PUT "${auth[@]}" \
            "$API/accounts/$ACCT_ID/workers/domains" \
            -H "Content-Type: application/json" \
            -d "{\"zone_id\":\"$ZONE_ID\",\"hostname\":\"$DOMAIN\",\"service\":\"$WORKER_NAME\",\"environment\":\"production\"}")
          echo "$DOM" | jq -r '{success, errors, result}'

          # Same reasoning as deploy-lib.yml: redeploying code doesn't evict
          # already-cached upstream responses, so purge on every deploy.
          PURGE=$(curl -s -X POST "${auth[@]}" "$API/zones/$ZONE_ID/purge_cache" \
            -H "Content-Type: application/json" -d '{"purge_everything":true}')
          echo "purge:"; echo "$PURGE" | jq -r '{success, errors}'

          echo "== Done. Test: https://$DOMAIN/index/aarch64.txt =="
