name: Rebuild catalog (provenance-aware full repair)

# Full provenance-aware catalog repair -- see tools/rebuild_catalog.py's
# module docstring for the complete pipeline. Runs UNSHARDED per arch
# (unlike the mirror/backfill scripts): the strict publish gate needs a
# complete picture of every canonical package's provenance before it can
# decide whether to publish anything at all, so splitting the work across
# shards would fragment that decision. Self-stops cleanly at
# REBUILD_DEADLINE_SECONDS, well under the runner's hard timeout, the same
# pattern the mirror scripts already use.
#
# Defaults to a dry run (publish_arch: none): reads live upstream + B2
# state and writes a repair-report-<arch>.json artifact, touches nothing.
# Safe to run repeatedly against production for inspection. publish_arch
# set to x86_64 or aarch64 attempts the real thing for THAT arch only --
# publishing both architectures in a single trigger is deliberately not
# offered, so a canary (x86_64 first) can be validated before aarch64
# follows. Either way, the strict gate in rebuild_catalog.py refuses to
# publish anything unless EVERY canonical package resolved cleanly with
# proven, continuity-verified provenance, every provides target exists,
# and every dependency classified -- expect it to refuse on a catalog
# with genuine upstream gaps until those are dealt with. That refusal is
# by design.
on:
  workflow_dispatch:
    inputs:
      publish_arch:
        description: "Which arch to attempt publishing this run (strict gate still applies). Publishing both in one trigger is deliberately not offered -- run x86_64 as a canary first, then aarch64 separately."
        type: choice
        options:
          - none
          - x86_64
          - aarch64
        default: none
      keep_orphans:
        description: "Skip quarantining orphan objects even when publishing (leaves old objects untouched for rollback safety)"
        type: boolean
        default: false
      diagnose_ambiguous:
        description: "Sample size for ambiguous-match diagnosis instead of a full run (0 = normal run)"
        type: number
        default: 0
      evaluate_bootstrap:
        description: "Sample size to evaluate semantic-fingerprint bootstrap matching instead of a full run (0 = normal run)"
        type: number
        default: 0
      classify_orphans:
        description: "Classify orphan objects by type instead of a full run (read-only, no quarantine/delete)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
  AWS_DEFAULT_REGION: eu-central-003
  B2_HTTP: https://s3.eu-central-003.backblazeb2.com
  REBUILD_DEADLINE_SECONDS: "19500"
  REBUILD_COMPONENTS_UBUNTU: "main,universe,multiverse,restricted"
  REBUILD_COMPONENTS_DEBIAN: "main,contrib,non-free-firmware"
  # Belt-and-suspenders alongside this script's own flush=True prints:
  # Python defaults to fully block-buffered stdout/stderr when not
  # attached to a real TTY (i.e. always, under GitHub Actions), so
  # without this, log lines can sit in an in-process buffer for a long
  # time before ever reaching the Actions log stream -- which is exactly
  # what made an earlier run of this workflow look silent/possibly-hung
  # for hours even though it was making real progress.
  PYTHONUNBUFFERED: "1"

jobs:
  rebuild:
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]
    runs-on: ubuntu-24.04
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - name: Install rpm/cpio (needed to import mirror_fedora.py)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rpm cpio zstd
      - name: Rebuild catalog
        working-directory: tools
        run: |
          ARGS="--arch ${{ matrix.arch }} --report-dir ../repair-reports"
          if [ "${{ inputs.diagnose_ambiguous }}" != "0" ]; then
            ARGS="$ARGS --diagnose-ambiguous ${{ inputs.diagnose_ambiguous }}"
          elif [ "${{ inputs.evaluate_bootstrap }}" != "0" ]; then
            ARGS="$ARGS --evaluate-bootstrap ${{ inputs.evaluate_bootstrap }}"
          elif [ "${{ inputs.classify_orphans }}" = "true" ]; then
            ARGS="$ARGS --classify-orphans"
          elif [ "${{ inputs.publish_arch }}" = "${{ matrix.arch }}" ]; then
            ARGS="$ARGS --publish"
          fi
          if [ "${{ inputs.keep_orphans }}" = "true" ]; then
            ARGS="$ARGS --keep-orphans"
          fi
          python3 rebuild_catalog.py $ARGS
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repair-report-${{ matrix.arch }}
          path: |
            repair-reports/repair-report-${{ matrix.arch }}.json
            repair-reports/ambiguous-diagnosis-${{ matrix.arch }}.json
            repair-reports/bootstrap-evaluation-${{ matrix.arch }}.json
            repair-reports/orphan-classification-${{ matrix.arch }}.json
          if-no-files-found: warn
