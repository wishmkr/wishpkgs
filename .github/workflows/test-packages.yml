name: Test every mirrored package (resolve + download + extract)

# Read-only pass over the live catalog (both archs): for every package,
# walks its full dependency closure exactly like wish's own resolver does,
# then downloads + checksum-verifies + extract-checks every package in that
# closure. Catches things `wish install <pkg>` would only surface at
# install time -- a missing dependency (wish's resolver only *warns* on
# "Package not found" and continues, so a broken dependency chain currently
# fails silently), a checksum mismatch, or a corrupt archive.
#
# Talks only to the public CDN (cdn.wishpkgs.org) -- no B2 credentials
# needed, nothing here can modify the catalog. 20 shards per arch,
# partitioned by tools/test_packages.py the same way the mirror scripts
# shard their work. Each shard uploads its own JSON report; the aggregate
# job merges everything into one report and writes a human-readable summary
# to the run's summary page.
on:
  workflow_dispatch:
    inputs:
      archs:
        description: "Comma-separated archs to test"
        type: string
        default: "aarch64,x86_64"

permissions:
  contents: read

env:
  WISH_CDN: https://cdn.wishpkgs.org
  TEST_SHARDS: "20"
  TEST_DEADLINE_SECONDS: "19500"

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        run: |
          set -eu
          ARCHS="${{ github.event.inputs.archs || 'aarch64,x86_64' }}"
          python3 - "$ARCHS" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          archs = [a.strip() for a in sys.argv[1].split(",") if a.strip()]
          combos = [{"arch": a, "shard": s} for a in archs for s in range(20)]
          print("matrix=" + json.dumps({"include": combos}))
          PY

  test:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      TEST_ARCH: ${{ matrix.arch }}
      TEST_SHARD: ${{ matrix.shard }}
      TEST_OUTPUT_DIR: results
    steps:
      - uses: actions/checkout@v4

      - name: Test shard ${{ matrix.shard }} (${{ matrix.arch }})
        id: run
        run: python3 tools/test_packages.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.arch }}-shard${{ matrix.shard }}
          path: results/*.json
          retention-days: 14

  aggregate:
    needs: test
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: results
          merge-multiple: true

      - name: Merge shard reports into one summary
        run: |
          python3 - <<'PY'
          import glob, json, collections

          all_results = {}
          per_arch_totals = collections.Counter()
          per_arch_failed = collections.Counter()
          reason_counts = collections.Counter()

          for path in glob.glob("results/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              arch = d["arch"]
              per_arch_totals[arch] += d["tested"]
              per_arch_failed[arch] += d["failed_count"]
              for name, outcome in d["results"].items():
                  all_results.setdefault(arch, {})[name] = outcome
                  if outcome != "ok":
                      reason = outcome.split(":", 1)[0]
                      reason_counts[reason] += 1

          with open("merged-report.json", "w") as f:
              json.dump(all_results, f, indent=2, sort_keys=True)

          # Full, untruncated list of every failure + its reason -- the
          # summary.md below only shows the first 50 per arch, this has all
          # of them, one per line, grep-able.
          with open("failures.log", "w") as f:
              for arch, pkgs in sorted(all_results.items()):
                  for name, outcome in sorted(pkgs.items()):
                      if outcome != "ok":
                          f.write(f"{arch}\t{name}\t{outcome}\n")

          lines = ["# Package test report\n"]
          for arch in sorted(per_arch_totals):
              t, fcount = per_arch_totals[arch], per_arch_failed[arch]
              pct = (100 * fcount / t) if t else 0
              lines.append(f"**{arch}**: {t} tested, {fcount} failed ({pct:.1f}%)\n")
          lines.append("\n## Failure reasons\n")
          for reason, count in reason_counts.most_common():
              lines.append(f"- `{reason}`: {count}\n")
          lines.append("\n## First 50 failing packages per arch\n")
          for arch, pkgs in all_results.items():
              failing = [(n, o) for n, o in sorted(pkgs.items()) if o != "ok"]
              lines.append(f"\n### {arch} ({len(failing)} failing)\n")
              for name, outcome in failing[:50]:
                  lines.append(f"- `{name}`: {outcome}\n")

          summary = "".join(lines)
          with open("summary.md", "w") as f:
              f.write(summary)
          print(summary)
          PY

      - name: Write to job summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: merged-package-test-report
          path: |
            merged-report.json
            summary.md
            failures.log
          retention-days: 30
