name: Test, heal, and re-verify the package catalog

# Three-phase, self-healing pass over the live catalog:
#
#  1. test-phase1 (10 shards total, not per arch -- each shard job works
#     its slice of every requested arch in turn): walks every package's
#     full dependency closure exactly like wish's own resolver, downloading
#     + checksum-verifying + extract-checking everything. Anything with no
#     .info at all anywhere in a closure is collected as a "missing name".
#  2. heal (1 job/arch): for every missing name, tries to actually mirror it
#     in for real -- checks Ubuntu (main/universe/multiverse/restricted),
#     then Debian (main/contrib/non-free-firmware), then Fedora
#     (Everything), in that order, and republishes index/<arch>.txt with
#     whatever it found. This is the ONLY step that writes to B2 -- needs
#     the same B2 credentials the mirror workflows use.
#  3. test-phase2 (10 shards total, same shape as phase1): re-checks ONLY
#     the names heal.py just tried to fix (not the whole catalog again) to
#     see whether the fix actually landed. Anything still broken here is a
#     real problem (most often a Debian/Ubuntu "virtual" package name like
#     dpkg-dev or perl-any that was never a real installable package to
#     begin with, not a mirroring gap) and goes straight into the final
#     report for a human to look at -- nothing here guesses or auto-fixes
#     further.
#
# test-phase1/2 are read-only against the public CDN (no secrets needed);
# only the heal job touches B2.
on:
  workflow_dispatch:
    inputs:
      archs:
        description: "Comma-separated archs to test"
        type: string
        default: "aarch64,x86_64"

permissions:
  contents: read

env:
  WISH_CDN: https://cdn.wishpkgs.org
  TEST_DEADLINE_SECONDS: "19500"
  HEAL_DEADLINE_SECONDS: "19500"
  AWS_DEFAULT_REGION: eu-central-003

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
      fixers: ${{ steps.gen.outputs.fixers }}
      archs: ${{ steps.gen.outputs.archs }}
    steps:
      - id: gen
        run: |
          set -eu
          ARCHS="${{ github.event.inputs.archs || 'aarch64,x86_64' }}"
          python3 - "$ARCHS" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          archs = [a.strip() for a in sys.argv[1].split(",") if a.strip()]
          print("shards=" + json.dumps({"include": [{"shard": s} for s in range(10)]}))
          print("fixers=" + json.dumps({"include": [{"shard": s} for s in range(7)]}))
          print("archs=" + json.dumps(archs))
          PY

  # ---- phase 1: discover ----
  # Exactly 10 shards total (not 10 per arch) -- each shard job tests its
  # slice of every requested arch in turn, sequentially within the same job.
  test-phase1:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      TEST_SHARD: ${{ matrix.shard }}
      TEST_SHARDS: "10"
      TEST_OUTPUT_DIR: results1
    steps:
      - uses: actions/checkout@v4
      - name: Test shard ${{ matrix.shard }} across all requested archs
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            TEST_ARCH="$arch" python3 tools/test_packages.py
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase1-shard${{ matrix.shard }}
          path: results1/*.json
          retention-days: 7

  # ---- collect: distinct missing names per arch ----
  collect-missing:
    needs: [plan, test-phase1]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      any_missing: ${{ steps.collect.outputs.any_missing }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: phase1-*
          path: results1
          merge-multiple: true

      - id: collect
        run: |
          python3 - <<'PY'
          import glob, json, os

          by_arch = {}
          for path in glob.glob("results1/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              by_arch.setdefault(d["arch"], set()).update(d.get("missing_names", []))

          any_missing = False
          for arch, names in by_arch.items():
              if names:
                  any_missing = True
              with open(f"missing-names-{arch}.txt", "w") as f:
                  f.writelines(f"{n}\n" for n in sorted(names))
              print(f"{arch}: {len(names)} distinct missing names")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_missing={'true' if any_missing else 'false'}\n")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: missing-names
          path: missing-names-*.txt
          retention-days: 7

  # ---- phase 2a: heal (writes to B2 -- only job in this workflow that does) ----
  # 7 fixers total, not per arch: each one claims its own hash-partitioned
  # slice of every requested arch's missing-name list (see in_shard() in
  # heal_missing.py) so they never race trying to mirror the same name in
  # twice, then searches Ubuntu -> Debian -> Fedora for its slice and
  # reports what it found.
  heal:
    needs: [plan, collect-missing]
    if: needs.collect-missing.outputs.any_missing == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.fixers) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      HEAL_SHARD: ${{ matrix.shard }}
      HEAL_SHARDS: "7"
      HEAL_OUTPUT_DIR: heal-results
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names
          path: missing-names

      - name: Fixer ${{ matrix.shard }} -- heal its slice across all requested archs
        run: |
          set -eu
          mkdir -p heal-results
          args=""
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            args="$args $arch:missing-names/missing-names-$arch.txt"
          done
          python3 tools/heal_missing.py $args

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heal-shard${{ matrix.shard }}
          path: heal-results/*.json
          retention-days: 14

  # ---- phase 2b: re-verify exactly what heal tried to fix ----
  # Same "10 shards total, not per arch" shape as phase1 -- each shard job
  # re-verifies its slice of every requested arch's missing-name list.
  test-phase2:
    needs: [plan, heal]
    if: always() && needs.heal.result != 'skipped'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names
          path: missing-names

      - name: Re-verify shard ${{ matrix.shard }} across all requested archs
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            python3 - "$arch" ${{ matrix.shard }} <<'PY'
          import hashlib, sys
          arch, shard, num_shards = sys.argv[1], int(sys.argv[2]), 10
          with open(f"missing-names/missing-names-{arch}.txt") as f:
              names = [l.strip() for l in f if l.strip()]
          mine = [n for n in names
                  if int(hashlib.md5(n.encode()).hexdigest(), 16) % num_shards == shard]
          with open("my-names.txt", "w") as f:
              f.writelines(f"{n}\n" for n in mine)
          print(f"{arch}: {len(mine)}/{len(names)} names assigned to this shard")
          PY
            TEST_ARCH="$arch" TEST_SHARD="${{ matrix.shard }}" TEST_SHARDS="10" \
              TEST_NAMES_FILE=my-names.txt TEST_OUTPUT_DIR=results2 \
              python3 tools/test_packages.py
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase2-shard${{ matrix.shard }}
          path: results2/*.json
          retention-days: 30

  # ---- final report: whatever's still broken after healing + re-verify ----
  final-report:
    needs: [test-phase2, heal]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: phase2-*
          path: results2
          merge-multiple: true
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          pattern: heal-*
          path: heal
          merge-multiple: true
        continue-on-error: true

      - name: Build final report
        run: |
          python3 - <<'PY'
          import glob, json

          heal_reports = {}
          for path in glob.glob("heal/heal-report-*.json"):
              with open(path) as f:
                  heal_reports.update(json.load(f))

          still_failing = {}
          totals = {}
          for path in glob.glob("results2/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              arch = d["arch"]
              totals[arch] = totals.get(arch, 0) + d["tested"]
              for name, outcome in d["results"].items():
                  if outcome != "ok":
                      still_failing[name] = outcome

          lines = ["# Final report: heal + re-verify\n\n"]
          lines.append(f"Names heal.py attempted: {len(heal_reports)}\n")
          healed_ok = sum(1 for v in heal_reports.values() if v.get("status") == "healed")
          lines.append(f"  - actually mirrored in: {healed_ok}\n")
          lines.append(f"  - not found anywhere (ubuntu/debian/fedora): "
                        f"{len(heal_reports) - healed_ok}\n\n")
          lines.append(f"Re-verified: {sum(totals.values())} names\n")
          lines.append(f"Still failing after heal: {len(still_failing)}\n\n")

          lines.append("## Still failing (needs a human look)\n")
          for name, outcome in sorted(still_failing.items()):
              source = heal_reports.get(name, {})
              status = source.get("status", "?")
              lines.append(f"- `{name}`: {outcome} (heal status: {status})\n")

          summary = "".join(lines)
          with open("final-summary.md", "w") as f:
              f.write(summary)
          with open("final-still-failing.json", "w") as f:
              json.dump(still_failing, f, indent=2, sort_keys=True)
          print(summary)
          PY

      - name: Write to job summary
        run: cat final-summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: |
            final-summary.md
            final-still-failing.json
          retention-days: 60
