name: Test, heal, and re-verify the package catalog (3 rounds)

# Chains 3 full heal -> verify rounds instead of just one, because healing a
# missing name can itself introduce brand new missing names one level down
# (its own freshly-published .info lists dependencies nobody's checked yet)
# -- one pass typically only resolves a fraction of the real gap. Each round
# narrows the remaining set further:
#
#   test-phase1 (discover, 20 shards total)
#     -> heal round 1 (7 fixers)   -> verify round 1 (20 shards)
#     -> heal round 2 (7 fixers)   -> verify round 2 (20 shards)
#     -> heal round 3 (7 fixers)   -> verify round 3 (20 shards)
#     -> summary-log
#
# Every verify round re-checks exactly the names the matching heal round
# just tried to fix, and (like phase1) also surfaces any NEW missing names
# it finds deeper in those packages' own dependency chains -- that's what
# feeds the next round's heal step.
#
# summary-log covers EVERY name ever tested across all 4 test rounds
# (phase1 + verify 1/2/3), both ok and failing -- not just the failures --
# as one full tab-separated log plus a count summary.
#
# Only the heal jobs write to B2 (need those credentials); every test/verify
# job is read-only against the public CDN.
on:
  workflow_dispatch:
    inputs:
      archs:
        description: "Comma-separated archs to test"
        type: string
        default: "aarch64,x86_64"

permissions:
  contents: read

env:
  WISH_CDN: https://cdn.wishpkgs.org
  TEST_DEADLINE_SECONDS: "19500"
  HEAL_DEADLINE_SECONDS: "19500"
  AWS_DEFAULT_REGION: eu-central-003

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
      fixers: ${{ steps.gen.outputs.fixers }}
      archs: ${{ steps.gen.outputs.archs }}
    steps:
      - id: gen
        run: |
          set -eu
          ARCHS="${{ github.event.inputs.archs || 'aarch64,x86_64' }}"
          python3 - "$ARCHS" <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys
          archs = [a.strip() for a in sys.argv[1].split(",") if a.strip()]
          print("shards=" + json.dumps({"include": [{"shard": s} for s in range(20)]}))
          print("fixers=" + json.dumps({"include": [{"shard": s} for s in range(7)]}))
          print("archs=" + json.dumps(archs))
          PY

  # ==== discover: full catalog scan, 20 shards total (not per arch) ====
  test-phase1:
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      TEST_SHARD: ${{ matrix.shard }}
      TEST_SHARDS: "20"
      TEST_OUTPUT_DIR: results-phase1
    steps:
      - uses: actions/checkout@v4
      - name: Test shard ${{ matrix.shard }} across all requested archs
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            TEST_ARCH="$arch" python3 tools/test_packages.py
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-phase1-shard${{ matrix.shard }}
          path: results-phase1/*.json
          retention-days: 30

  collect-1:
    needs: [plan, test-phase1]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      any_missing: ${{ steps.collect.outputs.any_missing }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: results-phase1-shard*
          path: results-phase1
          merge-multiple: true
      - id: collect
        run: |
          python3 - <<'PY'
          import glob, json, os
          by_arch = {}
          for path in glob.glob("results-phase1/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              by_arch.setdefault(d["arch"], set()).update(d.get("missing_names", []))
          any_missing = False
          for arch, names in by_arch.items():
              if names:
                  any_missing = True
              with open(f"missing-names-{arch}.txt", "w") as f:
                  f.writelines(f"{n}\n" for n in sorted(names))
              print(f"{arch}: {len(names)} distinct missing names")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_missing={'true' if any_missing else 'false'}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: missing-names-round1
          path: missing-names-*.txt
          retention-days: 7

  # ==== round 1: heal -> verify ====
  heal-round1:
    needs: [plan, collect-1]
    if: needs.collect-1.outputs.any_missing == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.fixers) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      HEAL_SHARD: ${{ matrix.shard }}
      HEAL_SHARDS: "7"
      HEAL_OUTPUT_DIR: heal-results
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round1
          path: missing-names
      - name: Fixer ${{ matrix.shard }} -- round 1
        run: |
          set -eu
          mkdir -p heal-results
          args=""
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            args="$args $arch:missing-names/missing-names-$arch.txt"
          done
          python3 tools/heal_missing.py $args
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heal-round1-shard${{ matrix.shard }}
          path: heal-results/*.json
          retention-days: 30

  verify-round1:
    needs: [plan, heal-round1]
    if: always() && needs.heal-round1.result != 'skipped'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round1
          path: missing-names
      - name: Re-verify shard ${{ matrix.shard }}
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            python3 - "$arch" ${{ matrix.shard }} <<'PY'
          import hashlib, sys
          arch, shard, num_shards = sys.argv[1], int(sys.argv[2]), 20
          with open(f"missing-names/missing-names-{arch}.txt") as f:
              names = [l.strip() for l in f if l.strip()]
          mine = [n for n in names
                  if int(hashlib.md5(n.encode()).hexdigest(), 16) % num_shards == shard]
          with open("my-names.txt", "w") as f:
              f.writelines(f"{n}\n" for n in mine)
          print(f"{arch}: {len(mine)}/{len(names)} names assigned to this shard")
          PY
            TEST_ARCH="$arch" TEST_SHARD="${{ matrix.shard }}" TEST_SHARDS="20" \
              TEST_NAMES_FILE=my-names.txt TEST_OUTPUT_DIR=results-verify1 \
              python3 tools/test_packages.py
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-verify1-shard${{ matrix.shard }}
          path: results-verify1/*.json
          retention-days: 30

  # ==== round 2: heal -> verify (targets whatever round 1's verify still found missing) ====
  collect-2:
    needs: [plan, verify-round1]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      any_missing: ${{ steps.collect.outputs.any_missing }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: results-verify1-shard*
          path: results-verify1
          merge-multiple: true
        continue-on-error: true
      - id: collect
        run: |
          python3 - <<'PY'
          import glob, json, os
          by_arch = {}
          for path in glob.glob("results-verify1/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              by_arch.setdefault(d["arch"], set()).update(d.get("missing_names", []))
          any_missing = False
          for arch in ${{ needs.plan.outputs.archs }}:
              names = by_arch.get(arch, set())
              if names:
                  any_missing = True
              with open(f"missing-names-{arch}.txt", "w") as f:
                  f.writelines(f"{n}\n" for n in sorted(names))
              print(f"{arch}: {len(names)} distinct missing names")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_missing={'true' if any_missing else 'false'}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: missing-names-round2
          path: missing-names-*.txt
          retention-days: 7

  heal-round2:
    needs: [plan, collect-2]
    if: needs.collect-2.outputs.any_missing == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.fixers) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      HEAL_SHARD: ${{ matrix.shard }}
      HEAL_SHARDS: "7"
      HEAL_OUTPUT_DIR: heal-results
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round2
          path: missing-names
      - name: Fixer ${{ matrix.shard }} -- round 2
        run: |
          set -eu
          mkdir -p heal-results
          args=""
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            args="$args $arch:missing-names/missing-names-$arch.txt"
          done
          python3 tools/heal_missing.py $args
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heal-round2-shard${{ matrix.shard }}
          path: heal-results/*.json
          retention-days: 30

  verify-round2:
    needs: [plan, heal-round2]
    if: always() && needs.heal-round2.result != 'skipped'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round2
          path: missing-names
      - name: Re-verify shard ${{ matrix.shard }}
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            python3 - "$arch" ${{ matrix.shard }} <<'PY'
          import hashlib, sys
          arch, shard, num_shards = sys.argv[1], int(sys.argv[2]), 20
          with open(f"missing-names/missing-names-{arch}.txt") as f:
              names = [l.strip() for l in f if l.strip()]
          mine = [n for n in names
                  if int(hashlib.md5(n.encode()).hexdigest(), 16) % num_shards == shard]
          with open("my-names.txt", "w") as f:
              f.writelines(f"{n}\n" for n in mine)
          print(f"{arch}: {len(mine)}/{len(names)} names assigned to this shard")
          PY
            TEST_ARCH="$arch" TEST_SHARD="${{ matrix.shard }}" TEST_SHARDS="20" \
              TEST_NAMES_FILE=my-names.txt TEST_OUTPUT_DIR=results-verify2 \
              python3 tools/test_packages.py
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-verify2-shard${{ matrix.shard }}
          path: results-verify2/*.json
          retention-days: 30

  # ==== round 3: heal -> verify ====
  collect-3:
    needs: [plan, verify-round2]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      any_missing: ${{ steps.collect.outputs.any_missing }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: results-verify2-shard*
          path: results-verify2
          merge-multiple: true
        continue-on-error: true
      - id: collect
        run: |
          python3 - <<'PY'
          import glob, json, os
          by_arch = {}
          for path in glob.glob("results-verify2/results-*-shard*.json"):
              with open(path) as f:
                  d = json.load(f)
              by_arch.setdefault(d["arch"], set()).update(d.get("missing_names", []))
          any_missing = False
          for arch in ${{ needs.plan.outputs.archs }}:
              names = by_arch.get(arch, set())
              if names:
                  any_missing = True
              with open(f"missing-names-{arch}.txt", "w") as f:
                  f.writelines(f"{n}\n" for n in sorted(names))
              print(f"{arch}: {len(names)} distinct missing names")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_missing={'true' if any_missing else 'false'}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: missing-names-round3
          path: missing-names-*.txt
          retention-days: 7

  heal-round3:
    needs: [plan, collect-3]
    if: needs.collect-3.outputs.any_missing == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.fixers) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
      HEAL_SHARD: ${{ matrix.shard }}
      HEAL_SHARDS: "7"
      HEAL_OUTPUT_DIR: heal-results
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round3
          path: missing-names
      - name: Fixer ${{ matrix.shard }} -- round 3
        run: |
          set -eu
          mkdir -p heal-results
          args=""
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            args="$args $arch:missing-names/missing-names-$arch.txt"
          done
          python3 tools/heal_missing.py $args
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: heal-round3-shard${{ matrix.shard }}
          path: heal-results/*.json
          retention-days: 30

  verify-round3:
    needs: [plan, heal-round3]
    if: always() && needs.heal-round3.result != 'skipped'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.shards) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: missing-names-round3
          path: missing-names
      - name: Re-verify shard ${{ matrix.shard }}
        run: |
          set -eu
          for arch in $(echo '${{ needs.plan.outputs.archs }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            python3 - "$arch" ${{ matrix.shard }} <<'PY'
          import hashlib, sys
          arch, shard, num_shards = sys.argv[1], int(sys.argv[2]), 20
          with open(f"missing-names/missing-names-{arch}.txt") as f:
              names = [l.strip() for l in f if l.strip()]
          mine = [n for n in names
                  if int(hashlib.md5(n.encode()).hexdigest(), 16) % num_shards == shard]
          with open("my-names.txt", "w") as f:
              f.writelines(f"{n}\n" for n in mine)
          print(f"{arch}: {len(mine)}/{len(names)} names assigned to this shard")
          PY
            TEST_ARCH="$arch" TEST_SHARD="${{ matrix.shard }}" TEST_SHARDS="20" \
              TEST_NAMES_FILE=my-names.txt TEST_OUTPUT_DIR=results-verify3 \
              python3 tools/test_packages.py
          done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-verify3-shard${{ matrix.shard }}
          path: results-verify3/*.json
          retention-days: 30

  # ==== final summary-log: every name tested across all 4 rounds, ok AND failing ====
  summary-log:
    needs: [verify-round3]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      # Each round's shard files are all named results-<arch>-shard<N>.json
      # -- downloading them into separate directories (not merged together)
      # so a later round's shard0 doesn't physically overwrite an earlier
      # round's shard0 on disk before the aggregation script ever runs.
      - uses: actions/download-artifact@v4
        with:
          pattern: results-phase1-shard*
          path: all-results/phase1
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: results-verify1-shard*
          path: all-results/verify1
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: results-verify2-shard*
          path: all-results/verify2
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: results-verify3-shard*
          path: all-results/verify3
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: heal-round1-shard*
          path: all-heal/round1
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: heal-round2-shard*
          path: all-heal/round2
          merge-multiple: true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with:
          pattern: heal-round3-shard*
          path: all-heal/round3
          merge-multiple: true
        continue-on-error: true

      - name: Build full DONE + FAIL log and summary
        run: |
          python3 - <<'PY'
          import glob, json

          heal_reports = {}
          for path in glob.glob("all-heal/round*/heal-report-*.json"):
              with open(path) as f:
                  heal_reports.update(json.load(f))

          # Latest-known status per (arch, name) across every round -- a
          # later round's result for the same name supersedes an earlier
          # one, since it reflects the state after more healing. Each round
          # was downloaded into its own subdirectory (see the download steps
          # above) specifically so same-named shard files from different
          # rounds don't clobber each other on disk before we get here.
          latest = {}
          for round_dir in ("phase1", "verify1", "verify2", "verify3"):
              for path in glob.glob(f"all-results/{round_dir}/results-*-shard*.json"):
                  with open(path) as f:
                      d = json.load(f)
                  arch = d["arch"]
                  for name, outcome in d["results"].items():
                      latest[(arch, name)] = outcome

          ok_count = sum(1 for v in latest.values() if v == "ok")
          fail_count = len(latest) - ok_count

          with open("full-results.log", "w") as f:
              for (arch, name), outcome in sorted(latest.items()):
                  status = "DONE" if outcome == "ok" else "FAIL"
                  f.write(f"{status}\t{arch}\t{name}\t{outcome}\n")

          lines = ["# 3-round heal + verify: final summary\n\n"]
          lines.append(f"Total distinct (arch, package) checked across all rounds: {len(latest)}\n")
          lines.append(f"  - DONE (ok): {ok_count}\n")
          lines.append(f"  - FAIL: {fail_count}\n\n")

          lines.append("## Heal totals (all 3 rounds combined)\n")
          healed_ok = sum(1 for v in heal_reports.values() if v.get("status") == "healed")
          lines.append(f"- names heal.py attempted: {len(heal_reports)}\n")
          lines.append(f"- actually mirrored in: {healed_ok}\n")
          lines.append(f"- not found anywhere (ubuntu/debian/fedora): {len(heal_reports) - healed_ok}\n\n")

          lines.append("## Still failing after round 3 (first 100)\n")
          still_failing = [(a, n, o) for (a, n), o in sorted(latest.items()) if o != "ok"]
          for arch, name, outcome in still_failing[:100]:
              lines.append(f"- `{arch}/{name}`: {outcome}\n")

          summary = "".join(lines)
          with open("summary.md", "w") as f:
              f.write(summary)
          print(summary)
          PY

      - name: Write to job summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: summary-log
          path: |
            summary.md
            full-results.log
          retention-days: 60
