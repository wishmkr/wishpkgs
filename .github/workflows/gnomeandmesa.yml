name: Build WishOS GNOME & Xorg Drivers (aarch64)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  XORG_SERVER_VERSION: "21.1.13"
  XORG_PROTO_VERSION: "2024.1"
  MESA_VERSION: "24.0.8"
  GNOME_SHELL_VERSION: "46.0"
  GNOME_CORE_VERSION: "46"
  PACKAGE_RELEASE: "1"
  ARCH: "aarch64"

jobs:
  build:
    name: Build ${{ matrix.package }} for aarch64

    strategy:
      fail-fast: false
      matrix:
        package:
          - xorg-server
          - xorg-drivers
          - mesa
          - gnome-shell
          - gnome-core

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            cmake \
            meson \
            ninja-build \
            wget \
            curl \
            git \
            file \
            bzip2 \
            gzip \
            tar \
            xz-utils \
            libssl-dev \
            zlib1g-dev \
            libncursesw5-dev \
            libncurses-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxrender-dev \
            libxkbfile-dev \
            libpixman-1-dev \
            libdrm-dev \
            libgbm-dev \
            wayland-protocols \
            libwayland-dev \
            libglib2.0-dev \
            libpulse-dev \
            libsystemd-dev \
            libpolkit-gobject-1-dev \
            libdbus-1-dev \
            libjson-glib-dev \
            libcodec2-dev \
            python3-mako \
            python3-setuptools \
            llvm-dev \
            libelf-dev \
            flex \
            bison \
            gobject-introspection \
            libgirepository1.0-dev \
            gtk-doc-tools

      - name: Create working directories
        run: |
          rm -rf source build package-root
          mkdir -p \
            source \
            build \
            package-root \
            "pkgs/${{ env.ARCH }}"

      # ======================================================
      # X.Org Server
      # ======================================================

      - name: Download X.Org Server
        if: matrix.package == 'xorg-server'
        working-directory: source
        run: |
          wget --https-only \
            "https://www.x.org/archive/individual/xserver/xorg-server-${XORG_SERVER_VERSION}.tar.xz"
          tar -xf "xorg-server-${XORG_SERVER_VERSION}.tar.xz"

      - name: Build and install X.Org Server
        if: matrix.package == 'xorg-server'
        run: |
          cd "source/xorg-server-${XORG_SERVER_VERSION}"
          ./configure \
            --prefix=/usr \
            --sysconfdir=/etc \
            --localstatedir=/var \
            --with-module-dir=/usr/lib/xorg/modules \
            --with-log-dir=/var/log \
            --enable-dri \
            --enable-dri2 \
            --enable-dri3 \
            --enable-glamor \
            --disable-xvfb \
            --disable-xnest \
            --disable-xephyr \
            --disable-kdrive
          make -j"$(nproc)"
          make DESTDIR="$GITHUB_WORKSPACE/package-root" install
          file "$GITHUB_WORKSPACE/package-root/usr/bin/Xorg" || true

      # ======================================================
      # X.Org Drivers (Video & Input)
      # ======================================================

      - name: Download X.Org Drivers
        if: matrix.package == 'xorg-drivers'
        working-directory: source
        run: |
          # Video drivers
          wget --https-only "https://www.x.org/archive/individual/driver/xf86-video-fbdev-0.5.0.tar.bz2"
          tar -xf xf86-video-fbdev-0.5.0.tar.bz2
          
          wget --https-only "https://www.x.org/archive/individual/driver/xf86-video-vesa-2.6.0.tar.bz2"
          tar -xf xf86-video-vesa-2.6.0.tar.bz2
          
          wget --https-only "https://www.x.org/archive/individual/driver/xf86-input-libinput-1.4.0.tar.bz2"
          tar -xf xf86-input-libinput-1.4.0.tar.bz2

      - name: Build and install X.Org Drivers
        if: matrix.package == 'xorg-drivers'
        run: |
          mkdir -p "$GITHUB_WORKSPACE/package-root/usr/lib/xorg/modules"
          
          for driver_dir in source/xf86-video-fbdev-* source/xf86-video-vesa-* source/xf86-input-libinput-*; do
            if [ -d "$driver_dir" ]; then
              cd "$driver_dir"
              ./configure --prefix=/usr --sysconfdir=/etc
              make -j"$(nproc)"
              make DESTDIR="$GITHUB_WORKSPACE/package-root" install
              cd "$GITHUB_WORKSPACE"
            fi
          done

      # ======================================================
      # Mesa (OpenGL/Vulkan)
      # ======================================================

      - name: Download Mesa
        if: matrix.package == 'mesa'
        working-directory: source
        run: |
          wget --https-only \
            "https://archive.mesa3d.org/mesa-${MESA_VERSION}.tar.xz"
          tar -xf "mesa-${MESA_VERSION}.tar.xz"

      - name: Build and install Mesa
        if: matrix.package == 'mesa'
        run: |
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            -Ddri-drivers=auto \
            -Dgallium-drivers=auto \
            -Dvulkan-drivers=auto \
            -Dglx=dri \
            -Degl=enabled \
            -Dgbm=enabled \
            -Dglvnd=enabled \
            -Dllvm=enabled \
            "source/mesa-${MESA_VERSION}" \
            build/mesa
          meson compile -C build/mesa
          DESTDIR="$GITHUB_WORKSPACE/package-root" meson install -C build/mesa
          file "$GITHUB_WORKSPACE/package-root/usr/lib/libGL.so" || true

      # ======================================================
      # GNOME Shell
      # ======================================================

      - name: Download GNOME Shell
        if: matrix.package == 'gnome-shell'
        working-directory: source
        run: |
          wget --https-only \
            "https://download.gnome.org/sources/gnome-shell/${GNOME_SHELL_VERSION%.*}/gnome-shell-${GNOME_SHELL_VERSION}.tar.xz"
          tar -xf "gnome-shell-${GNOME_SHELL_VERSION}.tar.xz"

      - name: Build and install GNOME Shell
        if: matrix.package == 'gnome-shell'
        run: |
          meson setup \
            --prefix=/usr \
            --buildtype=release \
            -Dman=false \
            "source/gnome-shell-${GNOME_SHELL_VERSION}" \
            build/gnome-shell
          meson compile -C build/gnome-shell
          DESTDIR="$GITHUB_WORKSPACE/package-root" meson install -C build/gnome-shell
          file "$GITHUB_WORKSPACE/package-root/usr/bin/gnome-shell" || true

      # ======================================================
      # GNOME Core (Desktop + Utilities)
      # ======================================================

      - name: Download GNOME Core packages
        if: matrix.package == 'gnome-core'
        working-directory: source
        run: |
          # Core GNOME components
          wget --https-only \
            "https://download.gnome.org/sources/gjs/${GNOME_CORE_VERSION}/gjs-1.${GNOME_CORE_VERSION}.0.tar.xz" && \
            tar -xf "gjs-1.${GNOME_CORE_VERSION}.0.tar.xz" || true
          
          wget --https-only \
            "https://download.gnome.org/sources/mutter/${GNOME_CORE_VERSION}/mutter-${GNOME_CORE_VERSION}.0.tar.xz" && \
            tar -xf "mutter-${GNOME_CORE_VERSION}.0.tar.xz" || true

      - name: Build and install GNOME Core
        if: matrix.package == 'gnome-core'
        run: |
          # Build individual components if they exist
          for component_dir in source/gjs-* source/mutter-*; do
            if [ -d "$component_dir" ]; then
              cd "$component_dir"
              if [ -f "meson.build" ]; then
                meson setup \
                  --prefix=/usr \
                  --buildtype=release \
                  build || true
                meson compile -C build || true
                DESTDIR="$GITHUB_WORKSPACE/package-root" meson install -C build || true
              elif [ -f "configure" ]; then
                ./configure --prefix=/usr
                make -j"$(nproc)" || true
                make DESTDIR="$GITHUB_WORKSPACE/package-root" install || true
              fi
              cd "$GITHUB_WORKSPACE"
            fi
          done

      # ======================================================
      # WishOS package metadata
      # ======================================================

      - name: Determine package metadata
        id: metadata
        shell: bash
        run: |
          case "${{ matrix.package }}" in
            xorg-server)
              VERSION="$XORG_SERVER_VERSION"
              DESCRIPTION="X.Org X Server for WishOS"
              LICENSE="MIT"
              DEPENDS="libxkbfile,pixman,openssl"
              ;;

            xorg-drivers)
              VERSION="$XORG_SERVER_VERSION"
              DESCRIPTION="X.Org Video and Input Drivers"
              LICENSE="MIT"
              DEPENDS="xorg-server,libinput"
              ;;

            mesa)
              VERSION="$MESA_VERSION"
              DESCRIPTION="Mesa OpenGL/Vulkan Graphics Library"
              LICENSE="MIT"
              DEPENDS="libdrm,libx11,wayland"
              ;;

            gnome-shell)
              VERSION="$GNOME_SHELL_VERSION"
              DESCRIPTION="GNOME Shell - Desktop Interface"
              LICENSE="GPL-2.0-or-later"
              DEPENDS="gjs,mutter,glib,gtk4"
              ;;

            gnome-core)
              VERSION="$GNOME_CORE_VERSION"
              DESCRIPTION="GNOME Core Libraries and Utilities"
              LICENSE="GPL-2.0-or-later,LGPL-2.1-or-later"
              DEPENDS="glib,gtk4,libadwaita,gjs"
              ;;

            *)
              echo "Unknown package: ${{ matrix.package }}"
              exit 1
              ;;
          esac

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "license=$LICENSE" >> "$GITHUB_OUTPUT"
          echo "depends=$DEPENDS" >> "$GITHUB_OUTPUT"

      - name: Add WishOS metadata
        run: |
          mkdir -p package-root/WISH

          cat > package-root/WISH/info <<EOF
          name=${{ matrix.package }}
          version=${{ steps.metadata.outputs.version }}
          release=${PACKAGE_RELEASE}
          arch=${{ env.ARCH }}
          description=${{ steps.metadata.outputs.description }}
          license=${{ steps.metadata.outputs.license }}
          depends=${{ steps.metadata.outputs.depends }}
          EOF

          find package-root \
            -mindepth 1 \
            ! -path 'package-root/WISH/files' \
            -printf '%P\n' \
            | sort \
            > package-root/WISH/files

      - name: Create .wsh package
        run: |
          PACKAGE_NAME="${{ matrix.package }}-${{ steps.metadata.outputs.version }}-${PACKAGE_RELEASE}-${{ env.ARCH }}.wsh"
          PACKAGE_DIRECTORY="pkgs/${{ env.ARCH }}"

          tar \
            --numeric-owner \
            --owner=0 \
            --group=0 \
            -C package-root \
            -czf "$PACKAGE_DIRECTORY/$PACKAGE_NAME" \
            .

          sha256sum \
            "$PACKAGE_DIRECTORY/$PACKAGE_NAME" \
            > "$PACKAGE_DIRECTORY/$PACKAGE_NAME.sha256"

          echo "Created package:"
          ls -lh "$PACKAGE_DIRECTORY/$PACKAGE_NAME"

          echo
          echo "Package contents:"
          tar -tzf "$PACKAGE_DIRECTORY/$PACKAGE_NAME" | head -50

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishpkgs-${{ matrix.package }}-${{ env.ARCH }}
          path: |
            pkgs/${{ env.ARCH }}/*.wsh
            pkgs/${{ env.ARCH }}/*.sha256
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish packages to main
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wishpkgs-*
          path: downloaded-packages
          merge-multiple: false

      - name: Copy packages into repository
        run: |
          mkdir -p pkgs/aarch64

          find downloaded-packages \
            -type f \
            -name '*.wsh' \
            -exec sh -c '
              for file do
                case "$file" in
                  *-aarch64.wsh)
                    cp "$file" pkgs/aarch64/
                    ;;
                esac
              done
            ' sh {} +

          find downloaded-packages \
            -type f \
            -name '*.sha256' \
            -exec sh -c '
              for file do
                case "$file" in
                  *-aarch64.wsh.sha256)
                    cp "$file" pkgs/aarch64/
                    ;;
                esac
              done
            ' sh {} +

          echo "Packages ready for publishing:"
          find pkgs -maxdepth 2 -type f -print | sort

      - name: Commit packages to main
        run: |
          git config user.name "WishOS Build Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pkgs/

          if git diff --cached --quiet; then
            echo "No package changes to commit."
            exit 0
          fi

          git commit \
            -m "build: update WishOS GNOME and Xorg packages (aarch64)"

          git pull \
            --rebase \
            origin main

          git push \
            origin HEAD:main
