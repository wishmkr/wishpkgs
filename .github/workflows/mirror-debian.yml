name: Mirror Debian packages into wish (.wsh)

# Same approach as mirror-ubuntu.yml but pulling from Debian's own archive
# (deb.debian.org, bookworm/main) instead of Ubuntu's. Publishes into the
# SAME canonical index/<arch>.txt as every other mirror -- one shared
# catalog, package origin never surfaced (see tools/mirror_common.py).
# Packages already present in the catalog (from this mirror or any other
# distro's) are skipped outright, never re-added.
#
# 6 parallel shards per arch (tools/mirror_debian.py partitions the package
# list by a stable hash). Progress lives in B2
# (state/debian/<arch>/shard<N>.done/.failed) so this resumes exactly where
# it left off, whether restarted manually or by itself.
on:
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Wipe Debian mirror progress and start over from scratch"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: mirror-debian
  cancel-in-progress: false

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
  AWS_DEFAULT_REGION: eu-central-003
  MIRROR_RELEASE: bookworm
  MIRROR_COMPONENTS: main
  MIRROR_DEADLINE_SECONDS: "19500" # ~5h25m, headroom for the coordinate job after
  B2_HTTP: https://s3.eu-central-003.backblazeb2.com

jobs:
  determine-arch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      arch: ${{ steps.get.outputs.arch }}
      alldone: ${{ steps.get.outputs.alldone }}
    steps:
      - name: Reset progress state (optional)
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          set -eu
          for arch in aarch64 x86_64; do
            for shard in 0 1 2 3 4 5; do
              aws s3 rm "s3://wishpkgs/state/debian/$arch/shard$shard.done" --endpoint-url "$B2_HTTP" || true
              aws s3 rm "s3://wishpkgs/state/debian/$arch/shard$shard.failed" --endpoint-url "$B2_HTTP" || true
              aws s3 rm "s3://wishpkgs/index/$arch/debian-shard$shard.txt" --endpoint-url "$B2_HTTP" || true
            done
          done
          aws s3 rm "s3://wishpkgs/state/debian-current-arch.txt" --endpoint-url "$B2_HTTP" || true
          echo "Debian mirror progress reset."

      - name: Determine current arch
        id: get
        run: |
          set -eu
          ARCH=$(curl -fsSL "$B2_HTTP/wishpkgs/state/debian-current-arch.txt" 2>/dev/null | tr -d '[:space:]' || true)
          [ -z "$ARCH" ] && ARCH="aarch64"
          if [ "$ARCH" = "done" ]; then
            echo "alldone=true" >> "$GITHUB_OUTPUT"
            echo "arch=aarch64" >> "$GITHUB_OUTPUT"
            echo "All architectures already fully mirrored."
          else
            echo "alldone=false" >> "$GITHUB_OUTPUT"
            echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
            echo "Current arch: $ARCH"
          fi

  mirror:
    needs: determine-arch
    if: needs.determine-arch.outputs.alldone == 'false'
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    runs-on: ubuntu-24.04
    timeout-minutes: 355 # hard safety net (5h55m); the script self-stops at ~5h25m
    env:
      MIRROR_ARCH: ${{ needs.determine-arch.outputs.arch }}
      MIRROR_SHARD: ${{ matrix.shard }}
      MIRROR_SHARDS: "6"
    steps:
      - uses: actions/checkout@v4

      - name: Mirror shard ${{ matrix.shard }} (${{ needs.determine-arch.outputs.arch }})
        id: run
        run: python3 tools/mirror_debian.py

      - name: Save shard status
        if: always()
        run: |
          mkdir -p status
          echo '{"shard": ${{ matrix.shard }}, "remaining": ${{ steps.run.outputs.remaining || 999999 }}}' \
            > status/shard-${{ matrix.shard }}.json
          cat status/shard-${{ matrix.shard }}.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shard-status-${{ matrix.shard }}
          path: status/shard-${{ matrix.shard }}.json
          retention-days: 1

  coordinate:
    needs: [determine-arch, mirror]
    if: always() && needs.determine-arch.outputs.alldone == 'false'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: shard-status-*
          path: status
          merge-multiple: true

      - name: Aggregate shards, advance arch if done, re-queue if work remains
        run: |
          set -eu
          ARCH="${{ needs.determine-arch.outputs.arch }}"

          TOTAL=0
          for shard in 0 1 2 3 4 5; do
            f="status/shard-$shard.json"
            if [ -f "$f" ]; then
              R=$(jq -r '.remaining' "$f")
            else
              echo "::warning::shard $shard reported no status; assuming work remains"
              R=999999
            fi
            echo "shard $shard remaining: $R"
            TOTAL=$((TOTAL + R))
          done
          echo "Total remaining for $ARCH: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            if [ "$ARCH" = "aarch64" ]; then NEXT="x86_64"; else NEXT="done"; fi
            echo "$NEXT" > current-arch.txt
            aws s3 cp current-arch.txt "s3://wishpkgs/state/debian-current-arch.txt" \
              --endpoint-url "$B2_HTTP" --no-progress
            echo "$ARCH fully mirrored -> advanced state/debian-current-arch.txt to $NEXT"
          fi

          FINAL=$(curl -fsSL "$B2_HTTP/wishpkgs/state/debian-current-arch.txt" | tr -d '[:space:]')
          if [ "$FINAL" != "done" ]; then
            echo "Work remains -- queuing another run."
            gh workflow run mirror-debian.yml --repo ${{ github.repository }}
          else
            echo "All architectures fully mirrored. Not re-queuing."
          fi
