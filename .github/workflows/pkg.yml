name: Build WishOS Packages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest

          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            wget \
            bzip2 \
            tar \
            gzip

      - name: Download BusyBox
        run: |
          wget https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xf busybox-1.36.1.tar.bz2

      - name: Configure BusyBox
        working-directory: busybox-1.36.1
        run: |
          make defconfig
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          make olddefconfig

      - name: Build BusyBox
        working-directory: busybox-1.36.1
        run: |
          make -j"$(nproc)"

      - name: Create WishOS package
        run: |
          PACKAGE_ROOT="package-root"
          PACKAGE_NAME="busybox-1.36.1-1-${{ matrix.arch }}.wsh"

          rm -rf "$PACKAGE_ROOT"
          mkdir -p "$PACKAGE_ROOT/usr/bin"
          mkdir -p "$PACKAGE_ROOT/WISH"

          cp busybox-1.36.1/busybox \
            "$PACKAGE_ROOT/usr/bin/busybox"

          cat > "$PACKAGE_ROOT/WISH/info" <<EOF
          name=busybox
          version=1.36.1
          release=1
          arch=${{ matrix.arch }}
          description=BusyBox for WishOS
          license=GPL-2.0
          EOF

          mkdir -p "pkgs/${{ matrix.arch }}"

          tar -C "$PACKAGE_ROOT" \
            -czf "pkgs/${{ matrix.arch }}/$PACKAGE_NAME" .

      - name: Upload architecture artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishpkgs-${{ matrix.arch }}
          path: pkgs/${{ matrix.arch }}/*.wsh
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download x86_64 package
        uses: actions/download-artifact@v4
        with:
          name: wishpkgs-x86_64
          path: pkgs/x86_64

      - name: Download AArch64 package
        uses: actions/download-artifact@v4
        with:
          name: wishpkgs-aarch64
          path: pkgs/aarch64

      - name: Commit packages to main
        run: |
          git config user.name "WishOS Build Bot"
          git config user.email "actions@github.com"

          git add pkgs/

          if git diff --cached --quiet; then
            echo "No package changes to commit."
            exit 0
          fi

          git commit -m "build: update BusyBox packages"
          git push
